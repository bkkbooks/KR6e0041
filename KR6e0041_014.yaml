body:
  text: 爾時不動優婆夷告善財童子言善男子我憶過去無垢光劫彼劫有佛名為修臂十號圓滿時有國王名曰電授唯有一女即我身是我於其夜分廢音樂時父母兄弟悉已眠寢五百童女亦皆昏寐我於樓上仰觀星宿於虛空中見彼如來如寶山王無量無邊天龍八部及不思議諸菩薩衆所共圍繞佛身普放大光明網遍滿十方無所障礙佛身毛孔皆出妙香我聞是香身體柔軟心生歡喜便從樓下合十指掌頂禮於佛諦觀彼佛不見頂相觀身左右莫知邊際思惟彼佛諸相隨好無有厭足善男子我於爾時竊自念言此佛世尊作何等業獲於如是勝妙之身相好圓滿光明具足眷屬成就宮殿莊嚴福德智慧總持三昧神通辨才咸不思議善男子時彼如來知我心念即告我言汝應發難摧伏心斷諸煩惱汝應發無能勝心破諸邪執汝應發無退怯心入深法門汝應發不動轉心拔生死苦汝應發無迷惑心普於一切諸趣受生汝應發無厭足心求見諸佛無有休息汝應發無知足心悉受一切如來法雨汝應發正思惟心普照一切佛法光明汝應發大住持心普轉一切如來法輪汝應發廣流通心隨衆生欲施其法寶善男子我於彼佛正等覺所聞如是法隨順趣求一切種智心無退轉求佛十力求佛辨才求佛光明求佛色身求佛相好求佛衆會求佛淨剎求佛威儀求佛壽命發是心已深心愛樂如渴思水其心堅固猶如金剛一切煩惱及以二乘所不能壞善男子我憶初發是心已來經閻浮提極微塵數劫尚不曾起一念欲心況行其事爾所劫中於自親屬有過失者尚不生起一念瞋心況他衆生無過失者爾所劫中於其自身不生我見況於衆具而計我所爾所劫中死時生時及於胎藏入住出時乃至夢中未曾迷惑起衆生想及無記心況於餘時爾所劫中乃至夢寐隨見一佛未曾忘失何況菩薩十眼所見爾所劫中受持一切如來正法未曾忘失一文一句乃至世俗所有言辭尚不忘失何況如來語言藏中所宣妙法爾所劫中受持一切如來法海一文一句無不思惟如理觀察乃至一切世俗之法尚恆思惟觀察覺了何況如來真勝義法爾所劫中受持一切如來法海未曾於一法中不得三昧乃至世間一切工巧技藝之法一一法中亦復如是爾所劫中住持一切如來法輪隨所住持未曾廢捨一文一句亦無錯謬乃至不曾生於世智唯除為欲調伏衆生爾所劫中見諸佛海未曾於一佛所不得成就清淨大願乃至於諸變化佛所悉亦如是爾所劫中見諸菩薩修行妙行無有一行我不成就而得清淨爾所劫中所見衆生無一衆生我不勸發阿耨多羅三藐三菩提心未曾勸一衆生乃至一念發於聲聞辟支佛意爾所劫中於一切佛所聞之法乃至一文一句不生疑心不生二想不生分別想不生種種想不生執著想不生高下想不生勝劣想不生愛憎想乃至無一念中生如是想善男子我從是來所見諸佛常得親近未曾捨離常見菩薩未曾捨離常見真實大善知識未曾捨離常聞諸佛清淨大願未曾捨離常聞菩薩所修妙行未曾捨離常聞菩薩波羅蜜門未曾捨離常聞菩薩地智光明門未曾捨離常聞菩薩總持三昧無盡藏門未曾捨離常聞菩薩普入無邊世界網門未曾捨離常聞菩薩普入無邊衆生界門未曾捨離常聞菩薩以智光明除滅一切衆生煩惱未曾捨離常聞菩薩生長一切衆生善根未曾捨離常聞菩薩能隨衆生遍周法界普現其身未曾捨離常聞菩薩以妙言音開悟法界一切衆生未曾捨離善男子我得菩薩難摧伏智慧藏解脫門我得菩薩求一切法心無疲厭莊嚴三昧門我得菩薩堅固受持願行門我得菩薩一切法平等地總持門我得菩薩一切法智光照辨才門現不思議自在神變汝欲見不善財言唯我心願見爾時不動優婆夷不起龍藏師子之座入菩薩難摧伏智慧藏解脫門求一切法心無疲厭莊嚴三昧門不空圓滿莊嚴三昧門十力智輪現前三昧門入如是等十億三昧門入此三昧門時十方各有不可説不可説佛剎極微塵數世界六種震動一一世界皆悉清淨琉璃所成一一世界中有百億四天下一一四天下皆有如來或升兜率或時降生入胎初生出家苦行或居道樹或現降魔示證菩提受梵王請趣波羅奈轉四諦輪或從忉利還閻浮提三道寶階從天而下或時現處遍六大城現大神通摧諸外道或時現住毗耶離城獼猴池側初制律儀或時現處王舍大城靈鷲山等説諸般若波羅蜜門乃至或現拘尸那城娑羅林間示般涅槃如是所作一切佛事普遍十方清淨世界一一如來放光明網周遍法界道場衆會清淨圍繞轉妙法輪開悟群品時不動優婆夷從三昧起告善財言善男子汝見此不汝聞此不汝解此不善財言唯我皆已見已聞已解優婆夷言善男子我唯得此菩薩所修堅固受持大願行門求一切法心無疲厭莊嚴三昧智光明門菩薩難摧伏智慧藏解脫門一切法平等地總持門一切法智光照辨才門為一切衆生善巧方便以妙言音普遍一切説微妙法皆令歡喜如諸菩薩摩訶薩如烏灑婆鳥遊行虛空無所障礙能入一切衆生大海自在甚深普遍觀察見有善根已成熟者即便執取置菩提岸又如商客入一切智大寶洲中採求如來十力智寶又如漁師有具足力持正法網入生死海漉諸衆生如阿修羅王能遍撓動三有大城諸煩惱海普令衆生究竟寂靜又如日輪出現虛空照愛水泥令其乾竭猶如滿月出現虛空令可化者心華開敷猶如大地普皆平等無量衆生於中止住恆受履踐心無分別增長一切善法根芽猶如大風所向無礙能拔一切諸見大樹壞散一切生死園苑如轉輪王遊行世間以四攝事攝諸衆生而我云何能知能説彼功德行善男子於此南方有一大城名都薩羅其中有一出家外道名曰遍行汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮不動優婆夷足繞無數匝殷勤瞻仰辭退而去爾時善財童子於不動優婆夷所得聞法已專心憶持所有教誨所有示導所有演説所有讚歎所遇光照皆悉隨順生希有心思惟觀察普遍修習一心正念漸漸前行經歷國邑村營聚落然後乃至都薩羅城於日沒時入彼城中鄽店閭里四達交衢處處尋求遍行外道於高顯處遠望觀察其城東北有一大山名妙吉祥善財童子於中夜時見此山頂有大光明峯巒峻峙巖岫攢拱草樹華林靡不輝映照耀城居如日初出見此事已生大歡喜作是念言我必於此見善知識便從城出正念觀察而登彼山住立思惟遙望瞻仰見此外道於其山上平坦之處徐步經行色相圓滿威光照耀吉祥福焰過於熾火十千梵衆之所圍繞大梵天王所不能及善財即時往詣其所頂禮其足繞無數匝合掌前立白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我説遍行答言善哉善哉善男子汝乃能發阿耨多羅三藐三菩提心復能請問諸菩薩行善男子我已安住至一切處隨順遍行菩薩行已成就普觀一切世間等無障礙三昧門已成就無依無作神通力已成就普門法界際般若波羅蜜如是一切智慧光明隨行圓滿善男子我能普於一切世間種種方所種種形色種種相貌種種歿生種種行解種種信樂一切趣類諸衆生中所謂天趣龍趣夜叉趣乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽地獄畜生閻羅王界人非人等一切趣類或住諸見或信二乘或有愛樂大乘之道如是一切諸衆生中我以種種方便種種智慧種種教化種種調伏平等利益悉令圓滿所謂或為演説一切世間種種技藝利益衆生或為演説堅如金剛能破無明陀羅尼智或為演説四攝方便攝諸衆生令得親近一切智道或為演説諸波羅蜜開示讚歎令其回向一切智位或為稱歎發菩提心令其不失無上道意或為稱讚諸菩薩行令其滿足能淨佛剎度衆生願或為演説造諸惡業受地獄等種種苦報令於不善深生厭離或為演説供養諸佛種諸善根決定獲得一切智果令其發起歡喜之心或為讚説一切如來應正等覺所有功德令樂佛身求一切智或為讚説諸佛威德令其願樂佛不壞身或為讚説佛自在身令求如來無能映蔽大威德體善男子我又於此都薩羅城一切方所一切族類若男若女諸人衆中以善方便示同其形隨其所應變化言音種種差別而為説法諸衆生等悉不能知我是何人從何而至唯令聞者如理修行悟真實義善男子如於此城利益衆生於閻浮提城邑聚落所有衆生止住之處悉亦如是而為利益善男子閻浮提內九十六衆各起異見而生執著我悉於其中方便調伏令其捨離所有諸見如閻浮提一切住處餘三天下亦復如是如四天下小千中千大千世界其中衆生一切住處亦復如是如此三千大千世界如是十方無量世界一切住處一切品類諸衆生海我悉於中隨諸衆生心之所樂以種種方便種種法門種種理趣種種正行種種事業現種種色身種種形相種種言音而為説法令彼衆生皆得利益善男子我唯知此至一切處隨順遍行菩薩行如諸菩薩摩訶薩得與衆生無差別身得與一切衆生數等三昧以變化身普入諸趣於一切處皆現受生清淨光明遍照法界其有見者無不蒙益以無礙願住一切劫得如帝網諸無等行常勤利益一切衆生雖於無量煩惱垢中恆與共居而無染著普於三世衆生平等以無我智周遍照耀以大悲藏增長善根而我云何能知能説彼功德行清淨智慧善男子於此南方有一國土名為廣博彼有聚落從國為名其中有一鬻香長者名曰具足優鉢羅華汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子禮遍行足繞無數匝殷勤瞻仰辭退而去爾時善財童子因善知識教不顧身命不著財寶不耽五欲不戀眷屬不重王位自在安樂唯願化導一切衆生令其成熟唯願莊嚴諸佛剎土普遍清淨唯願供養一切如來心無疲厭唯願證知諸法實性分明顯現唯願隨順甚深法界普遍無礙唯願修集一切菩薩大功德海終無退轉唯願恆於一切劫中修菩薩行唯願普入一切如來衆會道場唯願入於一三昧門普現諸三昧門自在神力唯願於佛一法輪中普持一切如來法輪唯願於佛一毛孔中見一切佛心無厭足唯願證得智慧光明能持一切諸佛法藏專求此等諸佛菩薩所有功德漸次遊行至廣博國及其聚落普遍尋求鬻香長者見已前詣頂禮其足繞無數匝合掌而立白言聖者我已先發阿耨多羅三藐三菩提心欲求一切佛平等智慧欲滿一切佛無量大願欲淨一切佛最上色身欲見一切佛清淨法身欲知一切佛廣大智身欲淨治一切菩薩諸行欲照明一切菩薩三昧欲安住一切菩薩總持欲堅牢一切菩薩功德欲除滅一切所有障礙欲遊行一切十方世界而未知菩薩云何學菩薩行云何修菩薩道而能出生一切種智長者告言善哉善哉善男子汝乃能發阿耨多羅三藐三菩提心善男子我善別知一切諸香所謂一切香一切燒香一切塗香一切末香亦知調合如是香法又知如是一切香王所出之處又善了知天香龍香夜叉香乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等所有諸香又善了知治諸病香斷諸惡香除憂惱香生染愛香增煩惱香滅煩惱香令於有為生樂著香令於有為生厭離香捨諸驕逸香聞法歡喜香發心念佛香證解法門香聖所受用香一切菩薩差別香一切菩薩地位香如是等香及調和法形相生起出現成就清淨安隱方便境界威力業用所從根本隨處隨人種類差別如是一切我皆了知善男子人間有香名曰龍藏因龍鬪生若燒一丸大如油麻即能興起大香焰雲猶如帝網彌覆王都於七日中雨細香雨若著身者身即金色若著衣服皆悉變成拘蘇摩華色若因風吹入宮殿中一切臺殿樓閣堂宇皆悉變為拘蘇摩華色衆生嗅者七日七夜歡喜充滿身心快樂惑熱清涼無有諸病及諸煩惱不相侵害離諸憂苦不驚不怖不迷不亂慈心相向志意清淨我知是已如應説法令其決定發阿耨多羅三藐三菩提心善男子摩羅耶山出栴檀香名曰牛頭若以塗身設入火坑火不能燒善男子海中有香名無能勝若以塗鼓及諸螺貝其聲發時一切敵軍悉皆退散善男子阿那婆達多池邊出沈水香名蓮華藏若燒一丸如麻子大香氣普熏閻浮提界衆生聞者離一切罪戒品清淨善男子雪山有香名具足明相若有衆生嗅此香者其心決定離諸染著我為説法莫不皆得離垢圓滿清淨三昧善男子羅剎界中有香名海藏其香但為轉輪王用若燒一丸香氣所熏王及四軍皆騰虛空遊止自在善男子善法堂中有香名香性莊嚴若燒一丸熏彼天衆普令發起念佛之心善男子須夜摩天有香名淨藏性若燒一丸熏彼天衆莫不雲集彼天王所恭敬聽聞王所説法善男子兜率天中有香名信度嚩囉於一生所繫菩薩座前若燒一丸興大香雲遍覆法界普雨一切諸供養具供養一切如來道場菩薩衆會善男子妙變化天有香名奪意性若燒一丸於七日中普雨一切不可思議諸莊嚴具善男子我唯知此調和香法如諸菩薩摩訶薩遠離一切諸惡習氣為無垢香永斷煩惱衆魔羂索超諸有趣得如幻智於諸世間皆無染著具足圓滿無所著戒淨無著智行無著境於一切處悉無有著其心平等無著無依而我何能知其妙行説其功德顯其所有清淨戒品示其所作無過失業闡其所有無過失智辨其離染三業行門善男子於此南方有一大城名曰樓閣彼有船師名婆施羅汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子禮長者足繞無數匝殷勤瞻仰一心戀慕辭退而去爾時善財童子一心正念向樓閣城隨順思惟觀察道路所謂觀道高卑觀道夷險觀道淨穢觀道安危觀道曲直漸次而行作如是念我當親近彼善知識善知識者是成就修行諸波羅蜜增勝道因善知識者是成就修行普入法界無礙道因善知識者是成就修行攝取一切衆生智道因善知識者是成就修行令一切衆生不墮險惡道因善知識者是成就修行令一切衆生離邪業道因善知識者是成就修行令一切衆生滅煩惱道因善知識者是成就修行令一切衆生除惡慧道因善知識者是成就修行令一切衆生離憍慢道因善知識者是成就修行令一切衆生拔惡刺道因善知識者是成就修行令一切衆生捨惡見道因善知識者是成就修行令一切衆生至一切智城道因何以故於善知識處得一切善法故依善知識力得一切智道故善知識者難見難遇於善知識如是思惟勤求作意漸次前行到彼城已見彼船師在城門外海岸上住百千商人大衆圍繞説大海法方便開示佛功德海即前往詣頂禮其足繞無數匝一心合掌白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我説船師告言善哉善哉善男子汝已能發阿耨多羅三藐三菩提心今復能問生大智因斷除一切生死苦因往一切智大寶洲因成就不壞趣大乘因遠離二乘怖生死因住諸三昧生智慧因遍行菩薩微細行因乘大願車遊菩薩行清淨道因以菩薩行莊嚴無壞智清淨道因普觀一切十方諸佛皆無障礙清淨道因速能趣入一切諸佛甚深智海清淨道因善男子我在海岸樓閣大城淨修菩薩大悲幢行善男子我普觀察閻浮提內貧窮衆生為饒益故修種種行隨其所願悉令滿足先以世間珍寶飲食充足其意復施法財令其歡喜令修福行令生智道令增善根力令發菩提心令淨菩提願令堅大悲力令修能滅生死道令起不捨生死行令攝衆生海令修功德海令照諸法海令見諸佛海令入種智海善男子我住於此如是思惟如是作意如是勤求如是利益如是安樂一切衆生善男子我知海中一切寶洲一切寶處一切寶性一切寶根一切寶種一切寶類我又能知淨一切寶鑽一切寶出一切寶作一切寶一切寶器一切寶用一切寶境界一切寶光明我又能知一切龍宮一切夜叉宮一切羅剎宮一切部多宮如是一切差別住處皆善回避免其諸難亦知大海漩澓淺深波濤遠近水色好惡種種不同亦善別知日月星辰列宿回轉運行度數變異災祥晝夜晷漏時分延促亦知其船鐵木堅脆機關澀滑水之大小風之逆順左右旋轉安危之相可行則行可止則止我以如是種種方便常能利益一切衆生善男子我以好船運諸商衆行安隱道示其寂靜無恐怖相復為説法令其歡喜隨所樂欲引至寶洲與諸珍寶咸使充足然後將領還閻浮提善男子我將大船如是往來從昔至今未曾損壞若有衆生得見我身聞我法者令其永不怖生死海必得入於一切智海必能竭盡諸愛欲海能以智光照三世海能盡一切衆生苦海能淨一切衆生心海速能嚴淨一切剎海普能往詣十方佛海普知一切衆生根海普了一切衆生行海普順一切衆生性海善男子我唯得此大悲幢行若有衆生見聞憶念與我同住皆悉不空如諸菩薩摩訶薩善能遊涉生死大海能不染著諸煩惱海能捨一切諸妄見海能觀一切諸法性海能以四攝攝衆生海能善安住一切智海能滅一切衆生著海能平等住一切時海能以神通度衆生海能以其時調衆生海而我云何能知能説彼功德行善男子於此南方有一城邑名樂瓔珞中有長者名為最勝汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子禮船師足繞無數匝殷勤瞻仰悲泣流淚求善知識心無厭足於善知識增戀慕心增愛樂心一心觀察辭退而去
