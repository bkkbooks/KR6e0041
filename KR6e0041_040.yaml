body:
  text: 爾時普賢菩薩摩訶薩稱歎如來勝功德已告諸菩薩及善財言善男子如來功德假使十方一切諸佛經不可説不可説佛剎極微塵數劫相續演説不可窮盡若欲成就此功德門應修十種廣大行願何等為十一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恆順衆生十者普皆回向善財白言大聖云何禮敬乃至回向普賢菩薩告善財言善男子言禮敬諸佛者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛世尊我以普賢行願力故起深信解如對目前悉以清淨身語意業常修禮敬一一佛所皆現不可説不可説佛剎極微塵數身一一身遍禮不可説不可説佛剎極微塵數佛虛空界盡我禮乃盡而虛空界不可盡故我此禮敬無有窮盡如是乃至衆生界盡衆生業盡衆生煩惱盡我禮乃盡而衆生界乃至煩惱無有盡故我此禮敬無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言稱讚如來者所有盡法界虛空界十方三世一切剎土所有極微一一塵中皆有一切世界極微塵數佛一一佛所皆有菩薩海會圍繞我當悉以甚深勝解現前知見各以出過辨才天女微妙舌根一一舌根出無盡音聲海一一音聲出一切言辭海稱揚讚歎一切如來諸功德海窮未來際相續不斷盡於法界無不周遍如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我讚乃盡而虛空界乃至煩惱無有盡故我此讚歎無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言廣修供養者所有盡法界虛空界十方三世一切佛剎極微塵中一一各有一切世界極微塵數佛一一佛所種種菩薩海會圍繞我以普賢行願力故起深信解現前知見悉以上妙諸供養具而為供養所謂華雲鬘雲天音樂雲天傘蓋雲天衣服雲天種種香塗香燒香末香如是等雲一一量如須彌山王然種種燈酥燈油燈諸香油燈一一燈炷如須彌山一一燈油如大海水以如是等諸供養具常為供養善男子諸供養中法供養最所謂如説修行供養利益衆生供養攝受衆生供養代衆生苦供養勤修善根供養不捨菩薩業供養不離菩提心供養善男子如前供養無量功德比法供養一念功德百分不及一千分不及一百千俱胝那由他分迦羅分算分數分諭分優婆尼沙陀分亦不及一何以故以諸如來尊重法故以如説修行出生諸佛故若諸菩薩行法供養則得成就供養如來如是修行是真供養故此廣大最勝供養虛空界盡衆生界盡衆生業盡衆生煩惱盡我供乃盡而虛空界乃至煩惱不可盡故我此供養亦無有盡念念相續無有間斷身語意業無有疲厭復次善男子言懺除業障者菩薩自念我於過去無始劫中由貪瞋癡發身口意作諸惡業無量無邊若此惡業有體相者盡虛空界不能容受我今悉以清淨三業遍於法界極微塵剎一切諸佛菩薩衆前誠心懺悔後不復造恆住淨戒一切功德如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我懺乃盡而虛空界乃至衆生煩惱不可盡故我此懺悔無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言隨喜功德者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來從初發心為一切智勤修福聚不惜身命經不可説不可説佛剎極微塵數劫一一劫中捨不可説不可説佛剎極微塵數頭目手足如是一切難行苦行圓滿種種波羅蜜門證入種種菩薩智地成就諸佛無上菩提及般涅槃分布舍利所有善根我皆隨喜及彼十方一切世界六趣四生一切種類所有功德乃至一塵我皆隨喜十方三世一切聲聞及辟支佛有學無學所有功德我皆隨喜一切菩薩所修無量難行苦行志求無上正等菩提廣大功德我皆隨喜如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨喜無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言請轉法輪者所有盡法界虛空界十方三世一切佛剎極微塵中一一各有不可説不可説佛剎極微塵數廣大佛剎一一剎中念念有不可説不可説佛剎極微塵數一切諸佛成等正覺一切菩薩海會圍繞而我悉以身口意業種種方便殷勤勸請轉妙法輪如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我常勸請一切諸佛轉正法輪無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言請佛住世者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來將欲示現般涅槃者及諸菩薩聲聞緣覺有學無學乃至一切諸善知識我悉勸請莫入涅槃經於一切佛剎極微塵數劫為欲利樂一切衆生如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此勸請無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言常隨佛學者如此娑婆世界毗盧遮那如來從初發心精進不退以不可説不可説身命而為布施剝皮為紙折骨為筆刺血為墨書寫經典積如須彌為重法故不惜身命何況王位城邑聚落宮殿園林一切所有及餘種種難行苦行乃至樹下成大菩提示種種神通起種種變化現種種佛身處種種衆會或處一切諸大菩薩衆會道場或處聲聞及辟支佛衆會道場或處轉輪聖王小王眷屬衆會道場或處剎利及婆羅門長者居士衆會道場乃至或處天龍八部人非人等衆會道場處於如是種種衆會以圓滿音如大雷震隨其樂欲成熟衆生乃至示現入於涅槃如是一切我皆隨學如今世尊毗盧遮那如是盡法界虛空界十方三世一切佛剎所有塵中一切如來皆亦如是於念念中我皆隨學如是虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨學無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言恆順衆生者謂盡法界虛空界十方剎海所有衆生種種差別所謂卵生胎生濕生化生或有依於地水火風而生住者或有依空及諸卉木而生住者種種生類種種色身種種形狀種種相貌種種壽量種種族類種種名號種種心性種種知見種種欲樂種種意行種種威儀種種衣服種種飲食處於種種村營聚落城邑宮殿乃至一切天龍八部人非人等無足二足四足多足有色無色有想無想非有想非無想如是等類我皆於彼隨順而轉種種承事種種供養如敬父母如奉師長及阿羅漢乃至如來等無有異於諸病苦為作良醫於失道者示其正路於暗夜中為作光明於貧窮者令得伏藏菩薩如是平等饒益一切衆生何以故菩薩若能隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野沙磧之中有大樹王若根得水枝葉華果悉皆繁茂生死曠野菩提樹王亦復如是一切衆生而為樹根諸佛菩薩而為華果以大悲水饒益衆生則能成就諸佛菩薩智慧華果何以故若諸菩薩以大悲水饒益衆生則能成就阿耨多羅三藐三菩提故是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺善男子汝於此義應如是解以於衆生心平等故則能成就圓滿大悲以大悲心隨衆生故則能成就供養如來菩薩如是隨順衆生虛空界盡衆生界盡衆生業盡衆生煩惱盡我此隨順無有窮盡念念相續無有間斷身語意業無有疲厭復次善男子言普皆回向者從初禮拜乃至隨順所有功德皆悉回向盡法界虛空界一切衆生願令衆生常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就關閉一切諸惡趣門開示人天涅槃正路若諸衆生因其積集諸惡業故所感一切極重苦果我皆代受令彼衆生悉得解脫究竟成就無上菩提菩薩如是所修回向虛空界盡衆生界盡衆生業盡衆生煩惱盡我此回向無有窮盡念念相續無有間斷身語意業無有疲厭善男子是為菩薩摩訶薩十種大願具足圓滿若諸菩薩於此大願隨順趣入則能成熟一切衆生則能隨順阿耨多羅三藐三菩提則能成滿普賢菩薩諸行願海是故善男子汝於此義應如是知若有善男子善女人以滿十方無量無邊不可説不可説佛剎極微塵數一切世界上妙七寶及諸人天最勝安樂布施爾所一切世界所有衆生供養爾所一切世界諸佛菩薩經爾所佛剎極微塵數劫相續不斷所得功德若復有人聞此願王一經於耳所有功德比前功德百分不及一千分不及一乃至優波尼沙陀分亦不及一或復有人以深信心於此大願受持讀誦乃至書寫一四句偈速能除滅五無間業所有世間身心等病種種苦惱乃至佛剎極微塵數一切惡業皆得銷除一切魔軍夜叉羅剎若鳩槃荼若毗舍闍若部多等飲血噉肉諸惡鬼神皆悉遠離或時發心親近守護是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切衆生悉應供養此善男子善得人身圓滿普賢所有功德不久當如普賢菩薩速得成就微妙色身具三十二大丈夫相若生人天所在之處常居勝族悉能破壞一切惡趣悉能遠離一切惡友悉能制伏一切外道悉能解脫一切煩惱如師子王摧伏群獸堪受一切衆生供養又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等此諸菩薩色相端嚴功德具足所共圍繞其人自見生蓮華中蒙佛授記得授記已經於無數百千萬億那由他劫普於十方不可説不可説世界以智慧力隨衆生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數世界衆生發菩提心隨其根性教化成熟乃至盡於未來劫海廣能利益一切衆生善男子彼諸衆生若聞若信此大願王受持讀誦廣為人説所有功德除佛世尊餘無知者是故汝等聞此願王莫生疑念應當諦受受已能讀讀已能誦誦已能持乃至書寫廣為人説是諸人等於一念中所有行願皆得成就所獲福聚無量無邊能於煩惱大苦海中拔濟衆生令其出離皆得往生阿彌陀佛極樂世界爾時普賢菩薩摩訶薩欲重宣此義普觀十方而説偈言所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言辭盡於未來一切劫讚佛甚深功德海以諸最勝妙華鬘妓樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來我昔所造諸惡業皆由無始貪恚癡從身語意之所生一切我今皆懺悔十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若欲示涅槃我悉至誠而勸請唯願久住剎塵劫利樂一切諸衆生所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根回向衆生及佛道我隨一切如來學修習普賢圓滿行供養過去諸如來及與現在十方佛未來一切天人師一切意樂皆圓滿我願普隨三世學速得成就大菩提所有十方一切剎廣大清淨妙莊嚴衆會圍繞諸如來悉在菩提樹王下十方所有諸衆生願離憂患常安樂獲得甚深正法利滅除煩惱盡無餘我為菩提修行時一切趣中成宿命常得出家修淨戒無垢無破無穿漏天龍夜叉鳩槃荼乃至人與非人等所有一切衆生語悉以諸音而説法勤修清淨波羅蜜恆不忘失菩提心滅除障垢無有餘一切妙行皆成就於諸惑業及魔境世間道中得解脫猶如蓮華不著水亦如日月不住空悉除一切惡道苦等與一切群生樂如是經於剎塵劫十方利益恆無盡我常隨順諸衆生盡於未來一切劫恆修普賢廣大行圓滿無上大菩提所有與我同行者於一切處同集會身口意業皆同等一切行願同修學所有益我善知識為我顯示普賢行常願與我同集會於我常生歡喜心願常面見諸如來及諸佛子衆圍繞於彼皆興廣大供盡未來劫無疲厭願持諸佛微妙法光顯一切菩提行究竟清淨普賢道盡未來劫常修習我於一切諸有中所修福智恆無盡定慧方便及解脫獲諸無盡功德藏一塵中有塵數剎一一剎有難思佛一一佛處衆會中我見恆演菩提行普盡十方諸剎海一一毛端三世海佛海及與國土海我遍修行經劫海一切如來語清淨一言具衆音聲海隨諸衆生意樂音一一流佛辨才海三世一切諸如來於彼無盡語言海恆轉理趣妙法輪我深智力普能入我能深入於未來盡一切劫為一念三世所有一切劫為一念際我皆入我於一念見三世所有一切人師子亦常入佛境界中如幻解脫及威力於一毛端極微中出現三世莊嚴剎十方塵剎諸毛端我皆深入而嚴淨所有未來照世燈成道轉法悟群有究竟佛事示涅槃我皆往詣而親近速疾周遍神通力普門遍入大乘力智行普修功德力威神普覆大慈力遍淨莊嚴勝福力無著無依智慧力定慧方便諸威力普能積集菩提力清淨一切善業力摧滅一切煩惱力降伏一切諸魔力圓滿普賢諸行力普能嚴淨諸剎海解脫一切衆生海善能分別諸法海能甚深入智慧海普能清淨諸行海圓滿一切諸願海親近供養諸佛海修行無倦經劫海三世一切諸如來最勝菩提諸行願我皆供養圓滿修以普賢行悟菩提一切如來有長子彼名號曰普賢尊我今回向諸善根願諸智行悉同彼願身口意恆清淨諸行剎土亦復然如是智慧號普賢願我與彼皆同等我為遍淨普賢行文殊師利諸大願滿彼事業盡無餘未來際劫恆無倦我所修行無有量獲得無量諸功德安住無量諸行中了達一切神通力文殊師利勇猛智普賢慧行亦復然我今回向諸善根隨彼一切常修學三世諸佛所稱歎如是最勝諸大願我今回向諸善根為得普賢殊勝行願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界乃至虛空世界盡衆生及業煩惱盡如是一切無盡時我願究竟恆無盡十方所有無邊剎莊嚴衆寶供如來最勝安樂施天人經一切剎微塵劫若人於此勝願王一經於耳能生信求勝菩提心渴仰獲勝功德過於彼即常遠離惡知識永離一切諸惡道速見如來無量光具此普賢最勝願此人善得勝壽命此人善來人中生此人不久當成就如彼普賢菩薩行往昔由無智慧力所造極惡五無間誦此普賢大願王一念速疾皆銷滅族姓種類及容色相好智慧咸圓滿諸魔外道不能摧堪為三界所應供速詣菩提大樹王坐已降伏諸魔衆成等正覺轉法輪普利一切諸含識若人於此普賢願讀誦受持及演説果報唯佛能證知決定獲勝菩提道若人誦此普賢願我説少分之善根一念一切悉皆圓成就衆生清淨願我此普賢殊勝行無邊勝福皆回向普願沈溺諸衆生速往無量光佛剎爾時普賢菩薩摩訶薩於如來前説此普賢廣大願王清淨偈已善財童子踊躍無量一切菩薩皆大歡喜如來讚言善哉善哉爾時世尊與諸聖者菩薩摩訶薩演説如是不可思議解脫境界勝法門時文殊師利菩薩而為上首諸大菩薩及所成熟六千比丘彌勒菩薩而為上首賢劫一切諸大菩薩無垢普賢菩薩而為上首一生補處住灌頂位諸大菩薩及餘十方種種世界普來集會一切剎海極微塵數諸菩薩摩訶薩衆大智舍利弗摩訶目犍連等而為上首諸大聲聞并諸人天一切世主天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切大衆聞佛所説皆大歡喜信受奉行南天竺烏茶國深信最勝善逝法者修行最勝大乘行者吉祥自在作清淨師子王上獻摩訶支那大唐國大吉祥天子大自在師子中大王手自書寫大方廣佛華嚴經百千偈中所説善財童子親近承事佛剎極微塵數善知識行中五十五聖者善知識入不思議解脫境界普賢行願品謹奉進上伏願大國聖王福聚高大超須彌山智慧深廣過四大海十方國土通為一家及書此經功德願集彼無量福聚等虛空界一切世界海無盡衆生界一切皆如善財童子得佛正見具足智慧見不可思議真善知識咸生歡喜得佛廣大普光明照離諸貪著成就無垢普賢菩薩最勝行願伏願書此大乘經典進奉功德慈氏如來成佛之時龍華會上早得奉覲大聖天王獲宿命智瞻見便識同受佛記盡虛空遍法界廣度未來一切衆生速得成佛貞元十一年十一月十八日進奉梵夾十二年六月五日奉詔於長安崇福寺譯十四年二月二十四日譯畢進上罽賓國三藏賜紫沙門般若宣梵文東都天宮寺沙門廣濟譯語西明寺賜紫沙門圓照筆受保壽寺沙門智柔回綴保壽寺沙門智通回綴成都府正覺寺沙門道弘潤文章敬寺沙門鑒虛潤文大覺寺沙門道章校勘證義千福寺沙門大通證禪義太原府崇福寺沙門澄觀詳定千福寺沙門虛邃詳定專知官右神策軍散兵馬使衙前馬軍正將兼押衙特進行鄧州司法參軍南珍貢右神策軍護軍中尉兼右街功德使元從興元元從雲麾將軍右監門衛大將軍知內